<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akçaylar OGSB - Galeri</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🏢 Akçaylar OGSB</h1>
            </div>
            <ul class="navbar-menu">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="kurumsal.html">Kurumsal</a></li>
                <li><a href="galeri.html" class="active">Galeri</a></li>
                <li><a href="referanslar.html">Referanslar</a></li>
                <li><a href="isg-rehberi.html">İSG Rehberi</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="page-section">
            <h2>Galeri</h2>
            <p>Sitemizdeki güzel mekanlara göz atın.</p>
            <div class="gallery-grid" id="gallery"></div>
            <div id="lightbox" class="lightbox">
                <span class="lightbox-close">&times;</span>
                <img id="lightbox-img" src="" alt="">
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Akçaylar OGSB. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        const galleryItems = [
            {img: 'https://via.placeholder.com/400x300?text=Havuz', title: 'Havuz'},
            {img: 'https://via.placeholder.com/400x300?text=Oyun+Alanı', title: 'Oyun Alanı'},
            {img: 'https://via.placeholder.com/400x300?text=Sosyal+Tesis', title: 'Sosyal Tesis'},
            {img: 'https://via.placeholder.com/400x300?text=Bahçe', title: 'Bahçe'},
            {img: 'https://via.placeholder.com/400x300?text=Giriş', title: 'Giriş'},
            {img: 'https://via.placeholder.com/400x300?text=Spor+Alanı', title: 'Spor Alanı'},
        ];

        loadGallery();

        function loadGallery() {
            const gallery = document.getElementById('gallery');
            galleryItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${item.img}" alt="${item.title}" onclick="openLightbox('${item.img}')">`;
                gallery.appendChild(div);
            });
        }

        function openLightbox(img) {
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-img').src = img;
        }

        document.querySelector('.lightbox-close').addEventListener('click', function() {
            document.getElementById('lightbox').style.display = 'none';
        });

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target.id === 'lightbox') this.style.display = 'none';
        });
    </script>
</body>
</html>
